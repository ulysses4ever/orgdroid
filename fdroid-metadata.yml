Summary: Outline editor for Emacs .org files
Description: |-
    A Workflowy-style hierarchical outline editor that reads and writes
    standard Emacs .org files. Open any .org file via the system file
    picker; edit headings, notes, TODO states, priorities, and tags;
    save back in place.

