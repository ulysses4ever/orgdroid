name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: ./gradlew test assembleDebug --no-daemon

      - name: Publish nightly pre-release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT="${GITHUB_SHA::7}"
          APK="orgdroid-debug-${SHORT}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK"

          git tag -f nightly
          git push origin -f nightly

          gh release delete nightly --yes 2>/dev/null || true

          printf '`%s` — %s\n' "$GITHUB_SHA" "$COMMIT_MSG" > notes.md

          gh release create nightly "$APK" \
            --prerelease \
            --title "Nightly" \
            --notes-file notes.md
